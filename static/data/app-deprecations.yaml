      removal_date: "2026-08-04"
      reason: "Drop support for the legacy Hetzner DNS provider"
      partial_details:
        feature: "Hetzner provider"
        description: "The legacy Hetzner DNS API is going to be shutdown soon by Hetzner. Please migrate to the Hetzner Cloud provider."
        steps:
          - "Edit the application"
          - "In the Provider Configuration, change the [Provider] from [Hetzner] to [Hetzner Cloud]"
          - "Provide the required fields."
          - "Save the application"

